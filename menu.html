<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KG Plataforma — Ferramentas</title>
<style>
  :root {
    --navy:   #060d1a;
    --deep:   #0a1628;
    --panel:  #0f2040;
    --border: #1e3a6e;
    --accent: #2563b8;
    --bright: #3b82e8;
    --glow:   #60a5fa;
    --text:   #e2e8f0;
    --muted:  #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(37,99,184,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,184,0.04) 1px,transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .header {
    background: linear-gradient(135deg, var(--navy), var(--deep));
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-box {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--bright));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 13px;
  }
  .header h1 { font-size: 15px; font-weight: 700; }
  .user-info { font-size: 12px; color: var(--muted); }
  .btn-logout {
    background: none; border: 1px solid var(--border);
    color: var(--muted); padding: 6px 14px;
    border-radius: 6px; font-size: 12px; cursor: pointer;
  }
  .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

  .main {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    position: relative; z-index: 1;
  }

  .greeting {
    text-align: center;
    margin-bottom: 48px;
  }
  .greeting h2 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
  .greeting p { font-size: 14px; color: var(--muted); }

  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }

  .tool-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .tool-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(37,99,184,0.2);
  }

  .tool-icon {
    width: 52px; height: 52px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    margin-bottom: 18px;
  }
  .tool-icon.pmo        { background: rgba(37,99,184,0.2); }
  .tool-icon.dcma       { background: rgba(139,92,246,0.2); }
  .tool-icon.praticavel { background: rgba(34,197,94,0.15); }

  .tool-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .tool-card p  { font-size: 13px; color: var(--muted); line-height: 1.5; }

  .tool-card .arrow {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 18px;
    font-size: 12px;
    font-weight: 600;
    color: var(--glow);
  }

  .footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-box">KG</div>
    <h1>KG Plataforma</h1>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <span class="user-info" id="userInfo"></span>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </div>
</div>

<div class="main">
  <div class="greeting">
    <h2>Bem-vindo, <span id="userName">—</span></h2>
    <p>Selecione a ferramenta que deseja acessar</p>
  </div>

  <div class="tools-grid" id="toolsGrid">
    <!-- preenchido via JS -->
  </div>
</div>

<div class="footer">
  © 2025 Kauê Gutierres / KG Consultoria &amp; Gestão de Projetos de Infraestrutura
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL      = 'https://uybgtupjkswtkqisipom.supabase.co/rest/v1/';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Ymd0dXBqa3N3dGtxaXNpcG9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyODA2MjcsImV4cCI6MjA5Nzg1NjYyN30.9Z_mZaeArTrs6ghTZIxLaed68i6aNzgFUiF2xXB1IaU';

const isConfigured = SUPABASE_URL !== 'https://uybgtupjkswtkqisipom.supabase.co/rest/v1/';
let sb = null;

const TOOL_META = {
  pmo: {
    icon: '📊',
    label: 'PMO Dashboard',
    desc: 'Controle de cronograma, EVM, Curva S, Tempo-Caminho e GRD para projetos de infraestrutura.',
    url: 'pmo.html',
    cls: 'pmo'
  },
  dcma: {
    icon: '✅',
    label: 'DCMA 14-Pontos',
    desc: 'Análise de qualidade do cronograma com os 14 critérios DCMA para validação e conformidade.',
    url: 'dcma.html',
    cls: 'dcma'
  },
  praticavel: {
    icon: '🌧️',
    label: 'Dias Praticáveis',
    desc: 'Cálculo de dias praticáveis com dados INMET, fator de retomada e análise de praticabilidade.',
    url: 'praticavel.html',
    cls: 'praticavel'
  }
};

if (isConfigured) {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  initFromSupabase();
} else {
  initFromSession();
}

async function initFromSupabase() {
  const { data } = await sb.auth.getSession();
  if (!data.session) { window.location.href = 'login.html'; return; }

  const user = data.session.user;
  const { data: profile } = await sb.from('profiles')
    .select('name, tools, status')
    .eq('id', user.id)
    .single();

  if (!profile || profile.status === 'blocked') {
    await sb.auth.signOut();
    window.location.href = 'login.html?blocked=1';
    return;
  }

  renderMenu(profile.name || user.email, profile.tools || []);
}

function initFromSession() {
  // Modo demo / sem Supabase
  const storedTools = JSON.parse(sessionStorage.getItem('kg_tools') || '["pmo","dcma","praticavel"]');
  const storedUser  = JSON.parse(sessionStorage.getItem('kg_user') || '{"email":"demo@kg.com"}');
  renderMenu(storedUser.email, storedTools);
}

function renderMenu(name, tools) {
  const firstName = name.split(/[\s@]/)[0];
  document.getElementById('userName').textContent = firstName;
  document.getElementById('userInfo').textContent = name;

  const grid = document.getElementById('toolsGrid');

  if (!tools.length) {
    grid.innerHTML = '<p style="color:var(--muted);text-align:center">Nenhuma ferramenta liberada. Entre em contato com o administrador.</p>';
    return;
  }

  grid.innerHTML = tools.map(key => {
    const m = TOOL_META[key];
    if (!m) return '';
    return `
      <a class="tool-card" href="${m.url}">
        <div class="tool-icon ${m.cls}">${m.icon}</div>
        <h3>${m.label}</h3>
        <p>${m.desc}</p>
        <span class="arrow">Acessar →</span>
      </a>`;
  }).join('');
}

async function doLogout() {
  if (sb) await sb.auth.signOut();
  sessionStorage.clear();
  window.location.href = 'login.html';
}
</script>
</body>
</html>
