<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KG Plataforma — Acesso</title>
<style>
  :root {
    --navy:#060d1a;--deep:#0a1628;--panel:#0f2040;--border:#1e3a6e;
    --accent:#2563b8;--bright:#3b82e8;--glow:#60a5fa;--text:#e2e8f0;
    --muted:#64748b;--danger:#ef4444;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--navy);color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(37,99,184,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,184,.05) 1px,transparent 1px);
    background-size:48px 48px;pointer-events:none}
  body::after{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);
    width:600px;height:600px;background:radial-gradient(circle,rgba(37,99,184,.15) 0%,transparent 70%);pointer-events:none}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:48px 40px;
    width:100%;max-width:420px;position:relative;z-index:1;
    box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 0 1px rgba(96,165,250,.05)}
  .logo-wrap{display:flex;align-items:center;gap:14px;margin-bottom:36px}
  .logo-box{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),var(--bright));
    border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:18px;letter-spacing:-1px;flex-shrink:0;box-shadow:0 4px 16px rgba(37,99,184,.4)}
  .logo-text h1{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.2}
  .logo-text p{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
  .card h2{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-.4px}
  .card .subtitle{font-size:13px;color:var(--muted);margin-bottom:32px}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .field input{width:100%;background:var(--deep);border:1px solid var(--border);border-radius:8px;
    padding:12px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
  .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,184,.2)}
  .field input::placeholder{color:var(--muted)}
  .btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--bright));
    border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;letter-spacing:.3px;
    cursor:pointer;margin-top:8px;transition:opacity .2s,transform .1s;position:relative}
  .btn-login:hover{opacity:.9}.btn-login:active{transform:scale(.99)}.btn-login:disabled{opacity:.5;cursor:not-allowed}
  .btn-login .spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);
    border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
  .btn-login.loading .btn-text{display:none}.btn-login.loading .spinner{display:block}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;
    padding:10px 14px;font-size:13px;color:#fca5a5;margin-top:16px;display:none}
  .error-msg.show{display:block}
  .footer-note{margin-top:32px;padding-top:20px;border-top:1px solid var(--border);
    text-align:center;font-size:11px;color:var(--muted);line-height:1.6}
  .footer-note a{color:var(--glow);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-box">KG</div>
    <div class="logo-text">
      <h1>KG Plataforma</h1>
      <p>Gestão de Infraestrutura</p>
    </div>
  </div>
  <h2>Acesse sua conta</h2>
  <p class="subtitle">Entre com as credenciais fornecidas pelo administrador.</p>
  <div class="field">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" id="btnLogin" onclick="doLogin()">
    <span class="btn-text">Entrar</span>
    <span class="spinner"></span>
  </button>
  <div class="error-msg" id="errorMsg"></div>
  <div class="footer-note">
    Problemas com o acesso? Entre em contato com<br>
    <a href="mailto:consultoria.kg@outlook.com">consultoria.kg@outlook.com</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Configuração Supabase
const _URL = 'https://uybgtupjkswtkqisipom.supabase.co';
const _KEY = 'sb_publishable__GlW2nbjJfGmYoBM27KqYg_oCZ6pjpQ';

const sb = window.supabase.createClient(_URL, _KEY);

// Verifica sessão existente
sb.auth.getSession().then(({ data }) => {
  if (data.session) redirectUser(data.session.user);
});

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btnLogin');
  const errEl    = document.getElementById('errorMsg');

  errEl.classList.remove('show');
  if (!email || !password) { showError('Preencha e-mail e senha.'); return; }

  btn.classList.add('loading');
  btn.disabled = true;

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    btn.classList.remove('loading');
    btn.disabled = false;
    showError(traduzirErro(error.message));
    return;
  }

  await redirectUser(data.user);
}

async function redirectUser(user) {
  const { data: profile } = await sb
    .from('profiles')
    .select('role, tools')
    .eq('id', user.id)
    .single();

  if (!profile) { window.location.href = 'pmo.html'; return; }

  if (profile.role === 'admin') {
    window.location.href = 'admin.html';
    return;
  }

  const tools = profile.tools || ['pmo'];
  if (tools.length === 1) {
    const map = { pmo:'pmo.html', dcma:'dcma.html', praticavel:'praticavel.html' };
    window.location.href = map[tools[0]] || 'menu.html';
  } else {
    sessionStorage.setItem('kg_tools', JSON.stringify(tools));
    sessionStorage.setItem('kg_user', JSON.stringify({ email: user.email, id: user.id }));
    window.location.href = 'menu.html';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function traduzirErro(msg) {
  if (msg.includes('Invalid login')) return 'E-mail ou senha incorretos.';
  if (msg.includes('Email not confirmed')) return 'Confirme seu e-mail antes de entrar.';
  if (msg.includes('Too many requests')) return 'Muitas tentativas. Aguarde alguns minutos.';
  return 'Erro: ' + msg;
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
