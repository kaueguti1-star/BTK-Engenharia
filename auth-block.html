<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
  // ----------------------------------------------------------------
  // Configuração — mesmos valores do login.html e admin.html
  // ----------------------------------------------------------------
  const SUPABASE_URL      = 'https://uybgtupjkswtkqisipom.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable__GlW2nbjJfGmYoBM27KqYg_oCZ6pjpQ';
  // ----------------------------------------------------------------

  const isConfigured = SUPABASE_URL !== 'COLE_SUA_URL_AQUI' && SUPABASE_URL.startsWith('https://');
  if (!isConfigured) return; // Em modo demo, não verifica sessão

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  window._kgSupabase = sb; // Disponível para o restante do app

  // Verifica sessão ao carregar
  sb.auth.getSession().then(async ({ data }) => {
    if (!data.session) {
      window.location.href = 'login.html';
      return;
    }

    const { data: profile } = await sb
      .from('profiles')
      .select('status, name, tools')
      .eq('id', data.session.user.id)
      .single();

    if (!profile || profile.status === 'blocked') {
      await sb.auth.signOut();
      window.location.href = 'login.html?msg=acesso_bloqueado';
      return;
    }

    // Expõe info do usuário globalmente
    window._kgUser = {
      id: data.session.user.id,
      email: data.session.user.email,
      name: profile.name,
      tools: profile.tools
    };
  });

  // Ouve mudanças de sessão (logout de outra aba, token expirado)
  sb.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT') {
      window.location.href = 'login.html';
    }
  });
})();
</script>
